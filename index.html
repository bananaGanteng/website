
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Key</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: rgba(201, 168, 76, 0.15);
    --bg: #0a0a0a;
    --surface: #111010;
    --text: #f0e8d5;
    --muted: #6b6560;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    position: relative;
  }

  /* Radial glow background */
  body::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Decorative corner lines */
  .corner {
    position: fixed;
    width: 60px;
    height: 60px;
    opacity: 0.25;
  }
  .corner-tl { top: 32px; left: 32px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-tr { top: 32px; right: 32px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  .corner-bl { bottom: 32px; left: 32px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-br { bottom: 32px; right: 32px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

  .card {
    position: relative;
    width: 480px;
    padding: 52px 48px 44px;
    background: var(--surface);
    border: 1px solid rgba(201,168,76,0.2);
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Top decorative line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.8s 0.1s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .title span {
    color: var(--gold);
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin-bottom: 36px;
    opacity: 0;
    animation: expandLine 0.8s 0.3s ease forwards;
  }

  @keyframes expandLine {
    from { width: 0; opacity: 0; }
    to   { width: 40px; opacity: 1; }
  }

  .key-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    opacity: 0;
    animation: fadeUp 0.8s 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .key-wrapper {
    position: relative;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.8s 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .key-display {
    width: 100%;
    padding: 18px 20px;
    background: #0d0d0d;
    border: 1px solid rgba(201,168,76,0.25);
    color: var(--gold-light);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.08em;
    outline: none;
    cursor: default;
    transition: border-color 0.3s;
  }

  .key-display:focus {
    border-color: var(--gold);
  }

  /* Shimmer effect on key */
  .key-wrapper::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(201,168,76,0.05) 50%, transparent 60%);
    background-size: 200% 100%;
    animation: shimmer 3s 1.2s ease infinite;
    pointer-events: none;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .btn {
    position: relative;
    width: 100%;
    padding: 18px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    overflow: hidden;
    transition: color 0.35s;
    opacity: 0;
    animation: fadeUp 0.8s 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: translateX(-101%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 0;
  }

  .btn:hover::before { transform: translateX(0); }
  .btn:hover { color: #0a0a0a; }

  .btn span { position: relative; z-index: 1; }

  .btn:active { transform: scale(0.98); }

  .status {
    margin-top: 20px;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    min-height: 16px;
    text-align: center;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.4s, transform 0.4s;
  }

  .status.show {
    opacity: 0.75;
    transform: translateY(0);
  }

  .footer-note {
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.05);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.8s 0.65s cubic-bezier(0.16,1,0.3,1) forwards;
  }
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="card">
  <div class="eyebrow">Access Credentials</div>
  <div class="title">Your <span>Key</span></div>
  <div class="divider"></div>

  <div class="key-label">License Key</div>
  <div class="key-wrapper">
    <input
      class="key-display"
      id="keyBox"
      value="KJHG-5T9U-QW2E-AS84-PL37-NM65"
      readonly
    >
  </div>

  <button class="btn" onclick="copyKey()">
    <span id="btnText">Copy to Clipboard</span>
  </button>

  <div class="status" id="status">Key copied to clipboard</div>

  <div class="footer-note">Keep this key confidential &mdash; do not share it publicly</div>
</div>

<script>
function copyKey() {
  const box = document.getElementById('keyBox');
  const status = document.getElementById('status');
  const btnText = document.getElementById('btnText');

  box.removeAttribute('readonly');
  box.select();
  box.setSelectionRange(0, 99999);
  document.execCommand('copy');
  box.setAttribute('readonly', true);

  status.classList.add('show');
  btnText.textContent = 'Copied ✓';

  setTimeout(() => {
    status.classList.remove('show');
    btnText.textContent = 'Copy to Clipboard';
  }, 2500);
}
</script>

</body>
</html>
